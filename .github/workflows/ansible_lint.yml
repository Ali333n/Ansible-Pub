name: Ansible Lint

on:
  push:
    paths:
      - 'Playbooks/**'
  pull_request:
    paths:
      - 'Playbooks/**'

jobs:
  build:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3"

      - name: Install latest Ansible Lint
        run: pip install --upgrade ansible-lint

      - name: Run Ansible Lint
        uses: ansible/ansible-lint@main
        with:
          args: 'Playbooks'
          setup_python: "false"
          working_directory: ""
