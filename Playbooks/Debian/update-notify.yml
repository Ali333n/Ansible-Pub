---
- name: Check for Updates and Notify via Discord
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3
    update_details_list: []
  gather_facts: true

  tasks:
    # Refresh package cache to get latest available versions
    - name: Update package cache
      ansible.builtin.apt:
        update_cache: true
      become: true

    # Simulate dist upgrade to detect available updates without installing
    - name: Simulate distribution upgrade
      ansible.builtin.apt:
        upgrade: dist
      check_mode: true
      register: apt_sim
      become: true

    # Extract package name, current and new version from apt output
    - name: Parse package update details
      ansible.builtin.set_fact:
        update_details_list: "{{ update_details_list | default([]) + [{'name': item.0, 'old_version': item.1, 'new_version': item.2}] }}"
      loop: "{{ apt_sim.stdout | regex_findall('Inst\\s+(\\S+)\\s+\\[([^\\]]+)\\]\\s+\\(([^\\s]+)', multiline=True) }}"
      when:
        - apt_sim.stdout is defined
        - "'Inst ' in apt_sim.stdout"

    # Format update information as JSON payload for Discord webhook
    - name: Build Discord notification payload
      ansible.builtin.set_fact:
        update_notification_json: {
          "Hostname": "{{ inventory_hostname }}",
          "Update Anzahl": "{{ update_details_list | length }}",
          "updates": "{{ update_details_list }}"
        }
      when: update_details_list | default([]) | length > 0

    # Send notification to Discord if updates are pending
    - name: Send Discord notification
      when: update_details_list | default([]) | length > 0
      ansible.builtin.uri:
        url: '{{ webhook_url }}'
        method: POST
        body_format: json
        body: "{{ update_notification_json }}"
        headers:
          Content-Type: application/json
        status_code: 204
