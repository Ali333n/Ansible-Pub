- name: Update and clean DNF packages, notify and reboot if needed
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3
  become: true

  tasks:
    # Install dnf-utils if not already installed (needed for needs-restarting)
    - name: Install dnf-utils
      ansible.builtin.dnf:
        name:
          - dnf-utils
        state: present

    # Remove unneeded packages
    - name: Remove unneeded packages
      ansible.builtin.dnf:
        autoremove: true
        state: absent

    # Upgrade all packages
    - name: Upgrade all packages with DNF
      ansible.builtin.dnf:
        update_cache: true
        name: '*'
        state: latest

    # Check if reboot is required
    - name: Check if system reboot is required
      ansible.builtin.command: needs-restarting
      register: reboot_required
      changed_when: reboot_required.stdout != ""
      failed_when: reboot_required.rc not in [0, 1]
      when: ansible_facts['os_family'] == 'RedHat'

    # Send Discord message when reboot is required
    - name: Send Discord message
      ansible.builtin.uri:
        url: '{{ webhook_url }}'
        method: POST
        body_format: json
        body: '{"content": "Rebooting {{ ansible_hostname }} {{ ansible_default_ipv4.address }}"}'
        headers:
          Content-Type: application/json
        status_code: 204
      # Send the Discord message only if a reboot is required
      when: reboot_required.rc == 1

    # Rebooting
    - name: Rebooting Systems
      ansible.builtin.reboot:
        msg: "Rebooting due to package updates"
      when: reboot_required.rc == 1
