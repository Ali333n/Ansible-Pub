---
# Get currently running kernel
- name: Get running kernel
  ansible.builtin.command: uname -r
  register: running_kernel
  changed_when: false

# Get current latest kernel image before update
- name: Get latest kernel image before update
  ansible.builtin.shell: "ls -1 /boot | grep -E '^(kernel|vmlinuz).*img$' | sort -V | tail -n1"
  register: preupdate_kernel
  changed_when: false

# Update all packages
- name: Update all packages with DNF
  ansible.builtin.dnf:
    name: '*'
    state: latest
    update_cache: true
  register: dnf_update_result

# Get latest kernel image after update
- name: Get latest kernel image after update
  ansible.builtin.shell: "ls -1 /boot | grep -E '^(kernel|vmlinuz).*img$' | sort -V | tail -n1"
  register: postupdate_kernel
  changed_when: false

# Compare pre/post kernel images
- name: Determine if new kernel was installed
  ansible.builtin.set_fact:
    reboot_required: "{{ preupdate_kernel.stdout != postupdate_kernel.stdout }}"

# Optional: Cross-check via modules directory (for safety)
- name: List installed kernel module directories
  ansible.builtin.shell: "ls -1 /lib/modules | sort -V | tail -n1"
  register: latest_modules
  changed_when: false

- name: Combine module check with image check
  ansible.builtin.set_fact:
    reboot_required: "{{ reboot_required or (latest_modules.stdout not in running_kernel.stdout) }}"

# Debug info for logging
- name: Debug kernel comparison
  ansible.builtin.debug:
    msg:
      - "Running kernel:        {{ running_kernel.stdout }}"
      - "Kernel before update:  {{ preupdate_kernel.stdout }}"
      - "Kernel after update:   {{ postupdate_kernel.stdout }}"
      - "Modules latest:        {{ latest_modules.stdout }}"
      - "Reboot required:       {{ reboot_required }}"

# Send Discord notification if reboot required
- name: Send Discord message
  ansible.builtin.uri:
    url: "{{ webhook_url }}"
    method: POST
    body_format: json
    body: >
      {"content": "Rebooting {{ ansible_hostname }} ({{ ansible_default_ipv4.address }}) -
      Kernel changed from {{ preupdate_kernel.stdout }} to {{ postupdate_kernel.stdout }}"}
    headers:
      Content-Type: application/json
    status_code: 204
  when: reboot_required | bool

# Reboot host if kernel changed
- name: Reboot localhost
  ansible.builtin.shell: "sleep 5 && systemctl reboot"
  async: 1
  poll: 0
  when: reboot_required | bool